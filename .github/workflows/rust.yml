name: Rust

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache Cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Precomp
      run: |
        chmod +x install-linux-deps.sh
        ./install-linux-deps.sh
        npm install -g @tauri-apps/cli@^1.6.0

    - name: Build autoupdater
      run: cargo build --release --manifest-path autoupdater/Cargo.toml --target x86_64-pc-windows-gnu
    - name: Build
      run: cargo build --release -p TeraLauncher
    - name: Build bridge
      run: cargo build --release --manifest-path launcher-bridge/Cargo.toml --target x86_64-pc-windows-gnu

    - name: Create filtered archive of repository
      run: |
        tar -czf tera-build.tar.gz \
          --exclude='./target/x86_64-pc-windows-gnu/release/build' \
          --exclude='./target/x86_64-pc-windows-gnu/release/deps' \
          --exclude='build' \
          --exclude='./node_modules' \
          --exclude='./.git' \
          --exclude='./.github/actions-cache'

    - name: Upload filtered archive
      uses: actions/upload-artifact@v4
      with:
        name: tera-launcher-root
        path: tera-build.tar.gz
        if-no-files-found: error
